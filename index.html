<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Academic OS Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; --accent: #3498db; }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* 顶部导航与切换 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; color: #666; font-weight: bold; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* 输入区 */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: #fff; border: 1px dashed #cbd5e0; padding: 15px; border-radius: 12px; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        /* 统计图表区 */
        #statsContainer { display: none; margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 12px; }
        .chart-wrapper { max-width: 400px; margin: 0 auto; }

        /* 列表展示 */
        .log-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; color: white; margin: 0 10px; white-space: nowrap; }
        .date-label { font-size: 0.75rem; color: #a0aec0; min-width: 80px; }
        
        /* 颜色配置 */
        .tag-学习 { background: #3498db; } .tag-写论文 { background: #e67e22; }
        .tag-上朝 { background: #9b59b6; } .tag-饮食 { background: #2ecc71; }
        .tag-LoveMoment { background: #e74c3c; } .tag-Social { background: #1abc9c; }
        .tag-其他 { background: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:20px;">
        <h1 id="headerTitle">PhD Life OS</h1>
        <p id="subTitle">数据驱动科研，感悟沉淀生活</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchView('daily')">今日打卡</button>
        <button class="tab-btn" onclick="switchView('stats')">周/月分析报告</button>
    </div>

    <div id="inputArea">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="写下现在的进展或心情...">
            <select id="tagSelect" style="padding:10px; border-radius:6px;">
                <option value="学习">📖 学习</option>
                <option value="写论文">✍️ 写论文</option>
                <option value="上朝">🏛️ 上朝</option>
                <option value="饮食">🥗 饮食</option>
                <option value="LoveMoment">❤️ Love Moment</option>
                <option value="Social">☕ Social</option>
                <option value="其他">🔗 其他</option>
            </select>
            <button onclick="addLog()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">记录</button>
        </div>
    </div>

    <div id="statsContainer">
        <h3 style="text-align:center;">事务分布分析</h3>
        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
        <div id="insightText" style="margin-top:20px; font-size:0.9rem; color:#666; text-align:center;"></div>
    </div>

    <div id="logList"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('phd_logs_pro')) || [];
    let currentView = 'daily';
    let myChart = null;

    function addLog() {
        const content = document.getElementById('taskInput').value;
        const tag = document.getElementById('tagSelect').value;
        if (!content) return;

        const now = new Date();
        const newLog = {
            id: Date.now(),
            date: now.toISOString().split('T')[0], // YYYY-MM-DD
            time: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0'),
            timestamp: now.getTime(),
            content: content,
            tag: tag
        };

        logs.unshift(newLog);
        localStorage.setItem('phd_logs_pro', JSON.stringify(logs));
        document.getElementById('taskInput').value = '';
        render();
    }

    function render() {
        const listEl = document.getElementById('logList');
        const today = new Date().toISOString().split('T')[0];
        let displayLogs = logs;

        if (currentView === 'daily') {
            displayLogs = logs.filter(l => l.date === today);
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('statsContainer').style.display = 'none';
        } else {
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('statsContainer').style.display = 'block';
            updateChart();
        }

        listEl.innerHTML = displayLogs.map(log => `
            <div class="log-item">
                <div style="display:flex; align-items:center;">
                    <span class="date-label">${log.date === today ? '今日' : log.date} ${log.time}</span>
                    <span class="tag tag-${log.tag}">${log.tag}</span>
                    <span>${log.content}</span>
                </div>
                <span style="color:#ccc; cursor:pointer;" onclick="deleteLog(${log.id})">&times;</span>
            </div>
        `).join('') || '<p style="text-align:center; color:#999; margin:40px;">暂无数据，开始记录你的第一天吧！</p>';
    }

    function updateChart() {
        const counts = {};
        // 仅分析最近30天的数据
        const thirtyDaysAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
        const relevantLogs = logs.filter(l => l.timestamp > thirtyDaysAgo);
        
        relevantLogs.forEach(l => counts[l.tag] = (counts[l.tag] || 0) + 1);

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(counts),
                datasets: [{
                    data: Object.values(counts),
                    backgroundColor: ['#3498db', '#e67e22', '#9b59b6', '#2ecc71', '#e74c3c', '#1abc9c', '#95a5a6']
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
        
        const topTag = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, '无');
        document.getElementById('insightText').innerText = `近30天你记录最频繁的活动是：${topTag}。继续保持平衡哦！`;
    }

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(view === 'daily' ? '今日' : '分析'));
        });
        render();
    }

    function deleteLog(id) {
        logs = logs.filter(l => l.id !== id);
        localStorage.setItem('phd_logs_pro', JSON.stringify(logs));
        render();
    }

    render();
</script>
</body>
</html>
