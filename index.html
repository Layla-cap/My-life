<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHD Life System | 博士生生活系统</title>
    <style>
        :root { --primary: #4a5568; --bg: #f7fafc; --accent-am: #f6ad55; --accent-pm: #4fd1c5; --accent-night: #9f7aea; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #2d3748; line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        header { border-bottom: 2px solid #edf2f7; margin-bottom: 30px; padding-bottom: 10px; }
        h1 { font-size: 1.8rem; letter-spacing: -1px; }
        .time-block { margin-bottom: 30px; padding: 20px; border-radius: 12px; border-left: 6px solid; }
        .am { border-left-color: var(--accent-am); background: #fffaf0; }
        .pm { border-left-color: var(--accent-pm); background: #e6fffa; }
        .night { border-left-color: var(--accent-night); background: #faf5ff; }
        h3 { margin-top: 0; display: flex; align-items: center; }
        input[type="checkbox"] { transform: scale(1.5); margin-right: 15px; cursor: pointer; }
        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-top: 10px; box-sizing: border-box; font-size: 14px; min-height: 80px; resize: vertical; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Academic Daily Log</h1>
            <p id="date-display"></p>
        </header>

        <div class="time-block am">
            <h3>☀️ Morning (上午)</h3>
            <label><input type="checkbox"> 文献/实验/核心产出</label>
            <textarea placeholder="在这里记录早晨的灵感或突发奇想..."></textarea>
        </div>

        <div class="time-block pm">
            <h3>🌤️ Afternoon (下午)</h3>
            <label><input type="checkbox"> 数据分析/学术琐事/写作</label>
            <textarea placeholder="下午的进展顺利吗？遇到了什么困难？"></textarea>
        </div>

        <div class="time-block night">
            <h3>🌙 Evening (晚上)</h3>
            <label><input type="checkbox"> 运动/阅读/复盘感悟</label>
            <textarea placeholder="给自己一个安静的时刻，写下今日的心情..."></textarea>
        </div>

        <button onclick="saveLog()">完成今日打卡 & 保存</button>
        <div class="footer">系统已部署 - 专注研究，享受生活</div>
    </div>

    <script>
        // 显示当前日期
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        function saveLog() {
            alert('打卡成功！内容已记录在浏览器缓存中。\n（如需永久同步建议配合 Notion 使用）');
            // 这里可以扩展将数据保存到 localstorage 的代码
        }
    </script>
</body>
</html>
