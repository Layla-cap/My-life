<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Life OS | 博士生科研生活系统</title>
    <style>
        :root { --primary: #2c3e50; --bg: #f8f9fa; --accent: #3498db; }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        /* 输入区域 */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #f0f4f8; padding: 15px; border-radius: 12px; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; background: white; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 列表展示 */
        .time-section { margin-top: 30px; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: #555; border-left: 4px solid var(--accent); padding-left: 10px; margin: 20px 0 10px; }
        .log-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .log-item:hover { background: #fcfcfc; }
        .log-info { display: flex; align-items: center; gap: 10px; }
        .time-stamp { color: #999; font-size: 0.85rem; font-family: monospace; }
        .tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; color: white; font-weight: bold; }
        
        /* 标签颜色定义 */
        .tag-学习 { background: #3498db; }
        .tag-写论文 { background: #e67e22; }
        .tag-上朝 { background: #9b59b6; }
        .tag-饮食 { background: #2ecc71; }
        .tag-LoveMoment { background: #e74c3c; }
        .tag-Social { background: #1abc9c; }
        .tag-其他 { background: #95a5a6; }

        .delete-btn { color: #ccc; cursor: pointer; font-size: 1.2rem; }
        .delete-btn:hover { color: #e74c3c; }
        
        .empty-state { text-align: center; color: #999; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="current-date">PhD Life System</h1>
        <p style="font-size: 0.9rem; color: #666;">记录研究点滴，对抗学术焦虑</p>
    </header>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="写了30分钟论文 / 读了某某文献...">
        <select id="tagSelect">
            <option value="学习">📖 学习</option>
            <option value="写论文">✍️ 写论文</option>
            <option value="上朝">🏛️ 上朝 (导师见面/开会)</option>
            <option value="饮食">🥗 饮食</option>
            <option value="LoveMoment">❤️ Love Moment</option>
            <option value="Social">☕ Social</option>
            <option value="其他">🔗 其他</option>
        </select>
        <button class="btn-add" onclick="addLog()">记录一下</button>
    </div>

    <div id="logDisplay">
        <div class="time-section">
            <div class="section-title">☀️ 上午 (08:00 - 12:00)</div>
            <div id="am-list"></div>
        </div>
        <div class="time-section">
            <div class="section-title">🌤️ 下午 (12:00 - 18:00)</div>
            <div id="pm-list"></div>
        </div>
        <div class="time-section">
            <div class="section-title">🌙 晚上 (18:00 - 24:00)</div>
            <div id="night-list"></div>
        </div>
    </div>
    
    <button onclick="clearAll()" style="margin-top:40px; background:none; border:none; color:#ccc; cursor:pointer; font-size:0.8rem; width:100%;">清空所有历史记录</button>
</div>

<script>
    // 页面初始化：显示日期并加载数据
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-CN', {month:'long', day:'numeric', weekday:'long'});
    let logs = JSON.parse(localStorage.getItem('phd_logs')) || [];
    renderLogs();

    function addLog() {
        const content = document.getElementById('taskInput').value;
        const tag = document.getElementById('tagSelect').value;
        if (!content) return;

        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const hour = now.getHours();

        const newLog = {
            id: Date.now(),
            content: content,
            tag: tag,
            time: timeStr,
            hour: hour
        };

        logs.unshift(newLog); // 新记录放在最前面
        localStorage.setItem('phd_logs', JSON.stringify(logs));
        document.getElementById('taskInput').value = ''; // 清空输入框
        renderLogs();
    }

    function renderLogs() {
        const lists = { am: '', pm: '', night: '' };
        
        logs.forEach(log => {
            const html = `
                <div class="log-item">
                    <div class="log-info">
                        <span class="time-stamp">${log.time}</span>
                        <span class="tag tag-${log.tag}">${log.tag}</span>
                        <span>${log.content}</span>
                    </div>
                    <span class="delete-btn" onclick="deleteLog(${log.id})">&times;</span>
                </div>
            `;
            if (log.hour >= 8 && log.hour < 12) lists.am += html;
            else if (log.hour >= 12 && log.hour < 18) lists.pm += html;
            else lists.night += html;
        });

        document.getElementById('am-list').innerHTML = lists.am || '<div class="empty-state">暂无记录</div>';
        document.getElementById('pm-list').innerHTML = lists.pm || '<div class="empty-state">暂无记录</div>';
        document.getElementById('night-list').innerHTML = lists.night || '<div class="empty-state">暂无记录</div>';
    }

    function deleteLog(id) {
        logs = logs.filter(log => log.id !== id);
        localStorage.setItem('phd_logs', JSON.stringify(logs));
        renderLogs();
    }

    function clearAll() {
        if(confirm("确定要清空所有记录吗？")) {
            localStorage.removeItem('phd_logs');
            logs = [];
            renderLogs();
        }
    }
</script>

</body>
</html>
